<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Foldiq</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #EFF6FF 0%, #fff 60%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 40px;
    }
    .brand img { width: 36px; height: 36px; border-radius: 9px; }
    .brand span { font-size: 20px; font-weight: 800; color: #0F172A; }
    .card {
      background: #fff; border-radius: 24px;
      padding: 52px 48px; max-width: 520px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .label {
      display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #3B82F6;
      background: #EFF6FF; padding: 4px 12px; border-radius: 99px;
      margin-bottom: 16px;
    }
    h1 { font-size: 28px; font-weight: 800; color: #0F172A; margin-bottom: 10px; }
    .sub { font-size: 15px; color: #475569; margin-bottom: 36px; line-height: 1.6; }
    .form { display: flex; flex-direction: column; gap: 14px; }
    .form input,
    .form textarea {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid #E2E8F0; border-radius: 12px;
      font-family: inherit; font-size: 15px; color: #0F172A;
      background: #F8FAFC; outline: none;
      transition: border-color .15s, background .15s;
      resize: vertical;
    }
    .form input:focus,
    .form textarea:focus { border-color: #3B82F6; background: #fff; }
    .form textarea { min-height: 130px; }
    .form button {
      width: 100%; padding: 16px;
      background: #3B82F6; color: #fff;
      font-size: 16px; font-weight: 700; font-family: inherit;
      border: none; border-radius: 14px; cursor: pointer;
      transition: background .15s;
    }
    .form button:hover { background: #1D4ED8; }
    .form button:disabled { background: #93C5FD; cursor: default; }
    .success {
      display: none; text-align: center; padding: 24px 0 8px;
    }
    .success .check {
      width: 64px; height: 64px; background: #10B981; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #fff; margin: 0 auto 20px;
    }
    .success h2 { font-size: 22px; font-weight: 800; color: #0F172A; margin-bottom: 8px; }
    .success p { font-size: 15px; color: #475569; }
    .back { display: block; margin-top: 28px; text-align: center; font-size: 14px; color: #94A3B8; text-decoration: none; }
    .back:hover { color: #3B82F6; }
  </style>
</head>
<body>
  <a class="brand" href="/">
    <img src="icon.png" alt="Foldiq" />
    <span>Foldiq</span>
  </a>

  <div class="card">
    <span class="label">Contact</span>
    <h1>Get in touch</h1>
    <p class="sub">Have a question, found a bug, or just want to say hi?<br>We read every message.</p>

    <form class="form" action="mailto:enrique.padron853@gmail.com" method="POST" enctype="text/plain">
      <input type="hidden" name="form-name" value="contact" />
      <input type="hidden" name="bot-field" />
      <input type="text" name="name" placeholder="Your name" required />
      <input type="email" name="email" placeholder="Your email" required />
      <textarea name="message" placeholder="Your message…" required></textarea>
      <button type="submit" id="send-btn">Send message</button>
    </form>

    <div class="success" id="success">
      <div class="check">✓</div>
      <h2>Message sent!</h2>
      <p>We'll get back to you as soon as possible.</p>
    </div>

    <a class="back" href="/">← Back to foldiq</a>
  </div>

</body>
</html>
