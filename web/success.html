<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Foldiq</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #F0F7FF 0%, #fff 60%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 56px 48px;
      text-align: center; max-width: 520px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .check {
      width: 72px; height: 72px; background: #10B981; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 36px; color: #fff;
    }
    h1 { font-size: 28px; font-weight: 800; color: #0F172A; margin-bottom: 12px; }
    p { font-size: 16px; color: #475569; line-height: 1.65; margin-bottom: 32px; }
    .btn-wrap { display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 15px; font-weight: 700;
      padding: 14px 28px; border-radius: 14px; text-decoration: none;
      transition: background .15s; width: 100%; max-width: 320px; justify-content: center;
    }
    .btn-mac  { background: #3B82F6; color: #fff; }
    .btn-mac:hover  { background: #1D4ED8; }
    .btn-win  { background: #1E293B; color: #fff; }
    .btn-win:hover  { background: #0F172A; }
    .btn-both { background: #F1F5F9; color: #334155; font-size: 13px; font-weight: 600; }
    .btn-both:hover { background: #E2E8F0; }
    .note { font-size: 13px; color: #94A3B8; margin-top: 12px; margin-bottom: 0; }
    .back { display: block; margin-top: 24px; font-size: 14px; color: #94A3B8; text-decoration: none; }
    .back:hover { color: #3B82F6; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 8px 0; width: 100%; max-width: 320px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#E2E8F0; }
    .divider span { font-size: 12px; color: #94A3B8; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>You're all set!</h1>
    <p id="main-msg">Thank you for purchasing Foldiq. Check your email for your receipt and download link.</p>

    <div class="btn-wrap" id="download-wrap">
      <!-- filled by JS -->
    </div>

    <a class="back" href="/">← Back to foldiq.netlify.app</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const platform = params.get('platform') || 'mac';
    const wrap = document.getElementById('download-wrap');

    const MAC_URL  = 'https://github.com/MystoganzTv/Foldiq/releases/latest/download/Foldiq.dmg';
    const WIN_URL  = 'https://github.com/MystoganzTv/Foldiq/releases/latest/download/Foldiq-Setup.exe';

    if (platform === 'windows') {
      wrap.innerHTML = `
        <a class="btn btn-win" href="${WIN_URL}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12V6.75l6-1.32v6.57H3zm17 0V5l-9 1.68V12h9zm0 1H12v5.28L20 20v-7zm-17 0h6v5.57l-6-1.32V13z"/></svg>
          Download Foldiq for Windows
        </a>
        <div class="divider"><span>also available</span></div>
        <a class="btn btn-both" href="${MAC_URL}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Download for Mac instead
        </a>
        <p class="note">Windows 10 / 11 · 64-bit</p>
      `;
    } else {
      wrap.innerHTML = `
        <a class="btn btn-mac" href="${MAC_URL}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Download Foldiq for Mac
        </a>
        <div class="divider"><span>also available</span></div>
        <a class="btn btn-both" href="${WIN_URL}">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12V6.75l6-1.32v6.57H3zm17 0V5l-9 1.68V12h9zm0 1H12v5.28L20 20v-7zm-17 0h6v5.57l-6-1.32V13z"/></svg>
          Download for Windows instead
        </a>
        <p class="note">macOS 14 Sonoma or later · Apple Silicon &amp; Intel</p>
      `;
    }
  </script>
</body>
</html>
