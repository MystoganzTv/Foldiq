<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Foldiq</title>
  <link rel="icon" type="image/png" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(180deg, #F0F7FF 0%, #fff 60%);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 56px 48px;
      text-align: center; max-width: 480px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .check {
      width: 72px; height: 72px; background: #10B981; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px; font-size: 36px; color: #fff;
    }
    h1 { font-size: 28px; font-weight: 800; color: #0F172A; margin-bottom: 12px; }
    p { font-size: 16px; color: #475569; line-height: 1.65; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #3B82F6; color: #fff; font-size: 16px; font-weight: 700;
      padding: 16px 28px; border-radius: 14px; text-decoration: none;
      transition: background .15s;
    }
    .btn:hover { background: #1D4ED8; }
    .back { display: block; margin-top: 20px; font-size: 14px; color: #94A3B8; text-decoration: none; }
    .back:hover { color: #3B82F6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>You're all set!</h1>
    <p>Thank you for purchasing Foldiq. Check your email for the download link and your receipt.</p>
    <a class="btn" href="#">⬇ Download Foldiq</a>
    <a class="back" href="/">← Back to foldiq.netlify.app</a>
  </div>
</body>
</html>
