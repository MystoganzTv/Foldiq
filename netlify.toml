[build]
  publish = "web"
  functions = "netlify/functions"
  command = "cd netlify/functions && npm install"

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/privacy-policy.html"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 301
