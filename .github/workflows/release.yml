name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.1, v1.1.0, etc.
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  # ── Windows x64 ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (Windows x64)
        run: npm run build:win -- --x64
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/dist-electron/Foldiq Setup*.exe

  # ── macOS (ARM + Intel universal) ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (macOS)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: desktop/dist-electron/*.dmg

  # ── Create GitHub Release with both installers ─────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/windows

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts/mac

      - name: Rename artifacts for clean URLs
        run: |
          mv artifacts/windows/*.exe artifacts/windows/Foldiq-Setup.exe || true
          mv artifacts/mac/*.dmg      artifacts/mac/Foldiq.dmg          || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Foldiq ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/windows/Foldiq-Setup.exe
            artifacts/mac/Foldiq.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
